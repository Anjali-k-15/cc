<!DOCTYPE html>
<html>

<head>

<title>Student Risk Analysis</title>

<style>

body{
margin:0;
padding:30px;
font-family:'Segoe UI';
background:#eef3f8;
}

.container{
max-width:1400px;
margin:auto;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:35px;
color:#2c3e50;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
}

.card{
background:#f8fbff;
padding:20px;
border-radius:15px;
}

label{
font-weight:600;
display:block;
margin-bottom:8px;
color:#34495e;
}

input,select{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #dcdde1;
font-size:15px;
}

button{
width:100%;
padding:16px;
margin-top:40px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#4facfe,#00f2fe);
color:white;
font-size:18px;
cursor:pointer;
font-weight:bold;
}

button:hover{
opacity:0.9;
}

.section{
margin-top:35px;
margin-bottom:20px;
font-size:22px;
color:#2c3e50;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>AI Student Risk Analysis Form</h1>

<form method="POST">

<div class="section">
Student Information
</div>

<div class="grid">

<div class="card">
<label>Student Name</label>
<input type="text" name="student_name" required>
</div>

<div class="card">
<label>Student ID</label>
<input type="text" name="student_id" required>
</div>

</div>

<div class="section">
Academic & Lifestyle Features
</div>

<div class="grid">

<div class="card">
<label>Hours Studied</label>
<input type="number" step="any" name="Hours_Studied" required>
</div>

<div class="card">
<label>Attendance</label>
<input type="number" step="any" name="Attendance" required>
</div>

<div class="card">
<label>Sleep Hours</label>
<input type="number" step="any" name="Sleep_Hours" required>
</div>

<div class="card">
<label>Previous Scores</label>
<input type="number" step="any" name="Previous_Scores" required>
</div>

<div class="card">
<label>Tutoring Sessions</label>
<input type="number" step="any" name="Tutoring_Sessions" required>
</div>

<div class="card">
<label>Physical Activity</label>
<input type="number" step="any" name="Physical_Activity" required>
</div>

<div class="card">
<label>Distance from Home</label>
<input type="number" step="any" name="Distance_from_Home" required>
</div>

<div class="card">
<label>Exam Score</label>
<input type="number" step="any" name="Exam_Score" required>
</div>

</div>

<div class="section">
Encoded Features
</div>

<div class="grid">

<div class="card">
<label>Parental Involvement</label>
<select name="Parental_Involvement" required>
<option value="0">Low</option>
<option value="1">Medium</option>
<option value="2">High</option>
</select>
</div>

<div class="card">
<label>Access to Resources</label>
<select name="Access_to_Resources" required>
<option value="0">Low</option>
<option value="1">Medium</option>
<option value="2">High</option>
</select>
</div>

<div class="card">
<label>Extracurricular Activities</label>
<select name="Extracurricular_Activities" required>
<option value="0">No</option>
<option value="1">Yes</option>
</select>
</div>

<div class="card">
<label>Motivation Level</label>
<select name="Motivation_Level" required>
<option value="0">Low</option>
<option value="1">Medium</option>
<option value="2">High</option>
</select>
</div>

<div class="card">
<label>Internet Access</label>
<select name="Internet_Access" required>
<option value="0">No</option>
<option value="1">Yes</option>
</select>
</div>

<div class="card">
<label>Family Income</label>
<select name="Family_Income" required>
<option value="0">Low</option>
<option value="1">Medium</option>
<option value="2">High</option>
</select>
</div>

<div class="card">
<label>Teacher Quality</label>
<select name="Teacher_Quality" required>
<option value="0">Low</option>
<option value="1">Medium</option>
<option value="2">High</option>
</select>
</div>

<div class="card">
<label>School Type</label>
<select name="School_Type" required>
<option value="0">Public</option>
<option value="1">Private</option>
</select>
</div>

<div class="card">
<label>Peer Influence</label>
<select name="Peer_Influence" required>
<option value="0">Negative</option>
<option value="1">Neutral</option>
<option value="2">Positive</option>
</select>
</div>

<div class="card">
<label>Learning Environment</label>
<select name="Learning_Environment" required>
<option value="0">Poor</option>
<option value="1">Average</option>
<option value="2">Good</option>
</select>
</div>

<div class="card">
<label>Health Status</label>
<select name="Health_Status" required>
<option value="0">Poor</option>
<option value="1">Average</option>
<option value="2">Good</option>
</select>
</div>

<div class="card">
<label>Stress Level</label>
<select name="Stress_Level" required>
<option value="0">Low</option>
<option value="1">Medium</option>
<option value="2">High</option>
</select>
</div>

<div class="card">
<label>Learning Disabilities</label>
<select name="Learning_Disabilities" required>
<option value="0">No</option>
<option value="1">Yes</option>
</select>
</div>

<div class="card">
<label>Social Skills</label>
<select name="Social_Skills" required>
<option value="0">Poor</option>
<option value="1">Average</option>
<option value="2">Good</option>
</select>
</div>

<div class="card">
<label>Goal Setting</label>
<select name="Goal_Setting" required>
<option value="0">Low</option>
<option value="1">Medium</option>
<option value="2">High</option>
</select>
</div>

<div class="card">
<label>Self Confidence</label>
<select name="Self_Confidence" required>
<option value="0">Low</option>
<option value="1">Medium</option>
<option value="2">High</option>
</select>
</div>

<div class="card">
<label>Class Participation</label>
<select name="Class_Participation" required>
<option value="0">Low</option>
<option value="1">Medium</option>
<option value="2">High</option>
</select>
</div>

<div class="card">
<label>Time Management</label>
<select name="Time_Management" required>
<option value="0">Poor</option>
<option value="1">Average</option>
<option value="2">Good</option>
</select>
</div>

<div class="card">
<label>Parental Education Level</label>
<select name="Parental_Education_Level" required>
<option value="0">School</option>
<option value="1">College</option>
<option value="2">Higher</option>
</select>
</div>

<div class="card">
<label>Project Work</label>
<select name="Project_Work" required>
<option value="0">Poor</option>
<option value="1">Average</option>
<option value="2">Good</option>
</select>
</div>

<div class="card">
<label>Attendance Pattern</label>
<select name="Attendance_Pattern" required>
<option value="0">Irregular</option>
<option value="1">Moderate</option>
<option value="2">Regular</option>
</select>
</div>

<div class="card">
<label>Gender</label>
<select name="Gender" required>
<option value="0">Male</option>
<option value="1">Female</option>
</select>
</div>

</div>

<button type="submit">
Analyze Student Risk
</button>

</form>

</div>

</body>

</html>
